name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  frontend-deploy:
    name: Build & Deploy Frontend to S3
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync build to S3
        run: aws s3 sync build/ s3://${{ secrets.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  
  backend-deploy:
    name: Deploy Backend on EC2 (ECR)
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo " Deploying backend from ECR..."

            if [ ! -d "app" ]; then
              git clone https://github.com/raihamzaumer/dockerized_multi-tier_app.git app
            fi

            cd app
            git pull origin main || git pull origin master

            # Login to ECR (FIXED)
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
            docker login --username AWS --password-stdin 288390777595.dkr.ecr.eu-north-1.amazonaws.com

            # Pull latest images and restart
            docker compose pull
            docker compose up -d

            echo " Backend deployed from ECR"
      