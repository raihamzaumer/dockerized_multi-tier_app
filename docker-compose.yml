version: "3.8"
services:
  frontend:
    image: hamzaumer/multi-tier-frontend
    expose:
      - "3000"
    depends_on:
      - backend

  backend:
    image:  288390777595.dkr.ecr.eu-north-1.amazonaws.com/backend:latest
    ports:
      - "8080:8080"
    depends_on:
      - db

  db:
    image: mysql:8  # Use the official MySQL image
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: multi_tier_db
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

